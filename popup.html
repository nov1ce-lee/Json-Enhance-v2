<!DOCTYPE html>
<html>
<head>
  <title>JSON Enhance</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="header-controls">
    <label class="setting-item">
      <input type="checkbox" id="always-standalone"> 
      <span>Always Standalone</span>
    </label>
    <button id="open-standalone" title="Open in standalone window">Open Standalone</button>
  </div>
  <textarea id="json-input" placeholder="Paste your JSON string here..."></textarea>
  <div id="json-output"></div>
  <div class="pin-hint">Tip: Pin this extension to keep the icon visible in the toolbar</div>
  <script src="popup.js"></script>
</body>
</html>
